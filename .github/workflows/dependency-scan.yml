name: Dependency scan

# Weekly + on-demand pip-audit. Runs against the resolved dependency tree.
# Fails the run on any unfixed CVE so Dependabot has something to chase.
#
# Dependabot config lives at .github/dependabot.yml and handles the actual
# auto-PRs for vulnerable + outdated dependencies.

on:
  schedule:
    - cron: "17 6 * * 1"  # Monday 06:17 UTC — off the top-of-hour rush
  workflow_dispatch:
  pull_request:
    paths:
      - pyproject.toml
      - empirica-mcp/pyproject.toml

env:
  PYTHONUNBUFFERED: "1"

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install (release deps only — no dev/test)
        # Editable install + `--skip-editable` (below): the first-party packages
        # (empirica, empirica-mcp) can't be audited against the advisory DB until
        # they're published to PyPI, so a version-bump PR to an unreleased version
        # made a non-editable `pip-audit --strict` fail with "could not be audited:
        # empirica (X.Y.Z)". Skipping the editable first-party dists (as ci.yml
        # already does) audits every THIRD-PARTY dependency strictly while not
        # false-failing on our own not-yet-published version.
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -e ./empirica-mcp
          pip install pip-audit

      - name: pip-audit (block on known CVEs)
        # --skip-editable (not --strict): pip-audit exits non-zero on any real CVE
        # regardless of --strict; --strict additionally fails on the skipped
        # first-party editable dists, which we intentionally skip. Matches ci.yml.
        run: pip-audit --skip-editable
